<!DOCTYPE html>
<html>
<head>
    <title>AUREXIS AI - Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; margin: 10px; background: #3B82F6; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #2563EB; }
        pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>AUREXIS AI - Backend Connection Test</h1>
    
    <div>
        <button onclick="testHealth()">Test Health</button>
        <button onclick="testUsers()">Test Users</button>
        <button onclick="testLogin()">Test Login</button>
        <button onclick="testFrontendLogin()">Test Frontend Login Function</button>
        <button onclick="clearResult()">Clear</button>
    </div>
    
    <div id="status"></div>
    <pre id="result"></pre>

    <script>
        const API_URL = 'http://127.0.0.1:8000';
        
        function log(message, type = 'info') {
            const status = document.getElementById('status');
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            status.innerHTML = `<span class="${className}">${message}</span>`;
            console.log(message);
        }
        
        function showResult(data) {
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        }
        
        function clearResult() {
            document.getElementById('result').textContent = '';
            document.getElementById('status').innerHTML = '';
        }
        
        async function testHealth() {
            log('Testing health endpoint...', 'info');
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                log('Health check successful!', 'success');
                showResult(data);
            } catch (error) {
                log(`Health check failed: ${error.message}`, 'error');
                showResult({ error: error.message });
            }
        }
        
        async function testUsers() {
            log('Testing users endpoint...', 'info');
            try {
                const response = await fetch(`${API_URL}/api/users`);
                const data = await response.json();
                log('Users fetch successful!', 'success');
                showResult(data);
            } catch (error) {
                log(`Users fetch failed: ${error.message}`, 'error');
                showResult({ error: error.message });
            }
        }
        
        async function testLogin() {
            log('Testing login endpoint...', 'info');
            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'Imayavarman',
                        password: 'Imayavarman@2000'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                log('Login successful!', 'success');
                showResult(data);
            } catch (error) {
                log(`Login failed: ${error.message}`, 'error');
                showResult({ error: error.message });
            }
        }
        
        // Simulate the frontend login function
        async function testFrontendLogin() {
            log('Testing frontend login function...', 'info');
            try {
                // This simulates the frontend API function
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'Imayavarman',
                        password: 'Imayavarman@2000'
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || `API Error: ${response.status} ${response.statusText}`);
                }
                
                const apiResponse = await response.json();
                
                // Handle the new API response format (like the frontend does)
                let loginResponse;
                if (apiResponse.success && apiResponse.data) {
                    loginResponse = {
                        success: apiResponse.success,
                        session_id: apiResponse.data.session_id,
                        user: apiResponse.data.user
                    };
                } else {
                    loginResponse = apiResponse;
                }
                
                log('Frontend login function successful!', 'success');
                showResult({
                    original_response: apiResponse,
                    processed_response: loginResponse
                });
                
            } catch (error) {
                log(`Frontend login function failed: ${error.message}`, 'error');
                showResult({ error: error.message });
            }
        }
    </script>
</body>
</html>
