<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
</head>
<body>
    <h1>Test Backend Connection</h1>
    <button onclick="testHealth()">Test Health</button>
    <button onclick="testLogin()">Test Login</button>
    <pre id="result"></pre>

    <script>
        const API_URL = 'http://127.0.0.1:8000';
        
        async function testHealth() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                document.getElementById('result').textContent = 'Health: ' + JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('result').textContent = 'Health Error: ' + error.message;
            }
        }
        
        async function testLogin() {
            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'Imayavarman',
                        password: 'Imayavarman@2000'
                    })
                });
                const data = await response.json();
                document.getElementById('result').textContent = 'Login: ' + JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('result').textContent = 'Login Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
